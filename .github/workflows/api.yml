name: API CI / Deploy

on:
  push:
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "services/api/**"

defaults:
  run:
    working-directory: services/api

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with bandit
        run: bandit -r app/ -ll

      - name: Run tests
        run: pytest -v
        env:
          DATABASE_URL: sqlite:///./test_ci.db

  deploy:
    name: Deploy to Heroku
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "."
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API to Heroku (priorauth-api)
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          cd services/api
          git init -b main
          git config user.email "${{ secrets.HEROKU_EMAIL }}"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy from GitHub Actions (${GITHUB_SHA::7})"
          git push -f \
            "https://heroku:${HEROKU_API_KEY}@git.heroku.com/priorauth-api.git" \
            main
