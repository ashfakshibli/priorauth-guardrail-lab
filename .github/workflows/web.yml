name: Web CI / Deploy

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://priorauth-api-a1bc3b3b3d0c.herokuapp.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Heroku
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "."
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Web to Heroku (priorauth-web)
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          cd apps/web
          git init -b main
          git config user.email "${{ secrets.HEROKU_EMAIL }}"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy from GitHub Actions (${GITHUB_SHA::7})"
          git push -f \
            "https://heroku:${HEROKU_API_KEY}@git.heroku.com/priorauth-web.git" \
            main
