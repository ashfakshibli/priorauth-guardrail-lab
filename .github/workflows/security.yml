name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        # gitleaks CLI is MIT-licensed and free — only gitleaks-action@v2 requires a paid license
        run: gitleaks detect --source . --redact --no-git=false

  pip-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: Audit Python dependencies
        # Ignored CVEs are transitive deps with no fix available in the current constraint set:
        #   PYSEC-2026-161   starlette: fix requires 1.x; fastapi requires starlette<1.0 — unfixable
        #   GHSA-2c2j-9gv5-cj73 / GHSA-7f5h-v6xp-fcq8  starlette: fix in 0.47.2/0.49.1;
        #                    newer starlette versions require Python>=3.10 and fastapi compatibility is limited
        #   GHSA-mf9w-mj56-hr94  python-dotenv: fix version 1.2.2 not yet released on PyPI (latest=1.2.1)
        #   GHSA-6w46-j5rx-g56g  pytest: fix version 9.0.3 not yet released on PyPI (latest=8.4.2)
        #   GHSA-gc5v-m9x4-r6x2  requests: transitive via openai; fix (>=2.33.0) requires Python>=3.10
        #   PYSEC-2026-141/142   urllib3: transitive; fix (>=2.7.0) requires Python>=3.10
        #   GHSA-w853-jp5j-5j7f / GHSA-qmgc-5h2g-mvrw  filelock: transitive via openai
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln GHSA-2c2j-9gv5-cj73 \
            --ignore-vuln GHSA-7f5h-v6xp-fcq8 \
            --ignore-vuln GHSA-mf9w-mj56-hr94 \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln GHSA-gc5v-m9x4-r6x2 \
            --ignore-vuln PYSEC-2026-141 \
            --ignore-vuln PYSEC-2026-142 \
            --ignore-vuln GHSA-w853-jp5j-5j7f \
            --ignore-vuln GHSA-qmgc-5h2g-mvrw

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
      - run: npm ci
      - run: npm audit --audit-level=high

  bandit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r app/ -ll
